name: CI

on:
  push:
    branches: [main, master, "fix/**", "feat/**"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test
        run: pnpm run test
      - name: Build
        run: pnpm run build
      - name: Bundle size budget
        run: pnpm run check:bundle-size
      - name: Install Playwright browsers + OS deps
        # --with-deps installs WebKit/Chromium system libraries on Ubuntu runners
        run: pnpm --filter demo-blog exec playwright install --with-deps chromium webkit
      - name: E2E smoke + mobile (chromium + webkit)
        # Visual snapshots are chromium-only and generated for Linux CI in a follow-up;
        # smoke/mobile validate behavior without Mac/Linux font pixel flakiness.
        run: pnpm --filter demo-blog exec playwright test e2e/smoke.spec.ts e2e/mobile.spec.ts
      - name: E2E visual regression (chromium)
        # Full-widget chrome (titles + controls + canvas). Higher threshold for host font drift.
        run: pnpm --filter demo-blog exec playwright test e2e/visual.spec.ts --project=chromium
        env:
          VISUAL_MAX_DIFF: "0.28"
