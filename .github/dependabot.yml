# Dependabot version updates — security scanning runs daily via GitHub Advisory DB.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

# Force public npm registry (org defaults may route @scoped packages to GitHub Packages).
registries:
  npm-npmjs:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true

updates:
  # ── npm (pnpm monorepo) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    registries:
      - npm-npmjs
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      production-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - area:ci
    commit-message:
      prefix: chore
    ignore:
      # Major bumps need manual review (Astro, React, etc.)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ───────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - area:ci
    commit-message:
      prefix: chore