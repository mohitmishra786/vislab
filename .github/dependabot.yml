# Dependabot version updates — security scanning runs daily via GitHub Advisory DB.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Public npm registry is configured in .npmrc (Dependabot npm-registry entries
# require authentication and cannot point at registry.npmjs.org without a token).

version: 2

updates:
  # ── npm (pnpm monorepo) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      production-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - area:ci
    commit-message:
      prefix: chore
    ignore:
      # Major bumps need manual review (Astro, React, etc.)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ───────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - area:ci
    commit-message:
      prefix: chore