# Dependabot version updates — security scanning runs daily via GitHub Advisory DB.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

registries: {}

updates:
  # ── npm (pnpm monorepo) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      # Club all security patches into a single weekly PR
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - patch
      # Club minor/patch version bumps into one PR (non-security)
      production-deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - area:ci
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Major bumps need manual review (Astro, React, etc.)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ───────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - area:ci
    commit-message:
      prefix: chore
      include: scope