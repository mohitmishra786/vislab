<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | VisLab</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  <style id="vislab-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
  </style>
  {% assign embed = page.vislab_embed | default: '/assets/js/vislab-embed.min.js' %}
  <script src="{{ embed | relative_url }}" defer></script>
  {% if page.vislab_legacy %}
  {% assign legacy = page.vislab_legacy | default: '/assets/js/vislab.min.js' %}
  <script src="{{ legacy | relative_url }}"></script>
  {% endif %}
</head>
<body>
  <main class="container">
    <article>
      <h1>{{ page.title }}</h1>
      <div class="content">
        {{ content }}
      </div>
    </article>
  </main>
</body>
</html>
